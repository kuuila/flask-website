<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>弥小乐杂货铺 | System Log</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --void-bg: #050505;
            --holy-gold: #FFD700;
            --cyber-blue: #00f3ff;
            --soul-red: #ff2a2a;
            --matrix-green: #0f0;
            --text-color: #e0e0e0;
        }

        body {
            background-color: var(--void-bg);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            perspective: 1000px;
        }

        /* 电影胶片噪点 */
        .film-grain {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            background: radial-gradient(circle at center, transparent 0%, #000 90%);
        }

        /* 核心卡片容器 */
        .relic-card {
            position: relative;
            width: 90vw;
            max-width: 400px;
            height: 85vh;
            background: #111;
            border: 4px solid var(--text-color);
            border-image: linear-gradient(45deg, var(--soul-red), var(--holy-gold), var(--cyber-blue), var(--soul-red)) 1;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.1);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 5;
        }

        /* 光环 */
        .halo {
            position: absolute;
            top: 60px;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, var(--holy-gold), transparent);
            animation: rotateHalo 4s linear infinite;
            filter: blur(20px);
            opacity: 0.6;
            z-index: -1;
        }

        /* Logo 容器 */
        .totem-container {
            margin-top: 20px;
            width: 100px;
            height: 100px;
            position: relative;
            animation: float 6s ease-in-out infinite;
            z-index: 2; 
        }

        .pixel-logo-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid #fff;
            image-rendering: pixelated;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            background-color: #fff;
        }

        .brand-name {
            margin-top: 20px;
            font-family: 'Noto Serif SC', serif;
            font-size: 22px;
            font-weight: bold;
            color: var(--holy-gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            letter-spacing: 2px;
            text-align: center;
            white-space: nowrap;
        }

        .subtitle {
            font-size: 10px;
            color: #666;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* 经文显影区 - 独立行模式 */
        .scripture-box {
            width: 100%;
            flex-grow: 1;
            font-size: 13px;
            line-height: 1.8;
            color: var(--text-color);
            position: relative;
            padding: 15px 10px;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
            background: rgba(255,255,255,0.02);
            text-align: left;
            overflow-y: auto;
            scroll-behavior: smooth;
        }
        
        /* 每一行文字容器 */
        .log-line {
            margin-bottom: 8px; /* 行间距 */
            word-wrap: break-word;
            opacity: 0.9;
        }
        
        .divider-line {
            color: #555;
            margin: 15px 0;
            text-align: center;
            font-size: 10px;
            letter-spacing: 4px;
        }

        .scripture-box::-webkit-scrollbar { width: 4px; }
        .scripture-box::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        /* 底部符号 */
        .footer-sigil {
            margin-top: 15px;
            display: flex;
            gap: 15px;
            font-size: 18px;
            min-height: 30px;
        }
        
        /* 光标 */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 14px;
            background: var(--matrix-green);
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes rotateHalo { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    </style>
</head>
<body>

    <div class="film-grain"></div>

    <div class="relic-card" id="card">
        <div class="halo"></div>

        <div class="totem-container">
            <img src="/static/logo_wb.jpg" alt="弥小乐Logo" class="pixel-logo-img">
        </div>

        <div class="brand-name">弥小乐杂货铺</div>
        <div class="subtitle">Mi Xiaole Sanctuary</div>

        <div class="scripture-box" id="terminal-screen">
            <!-- 内容将通过 JS 逐行追加 -->
            <span class="cursor" id="main-cursor"></span>
        </div>

        <div class="footer-sigil">
            <span title="Game">🎮</span>
            <span title="Soul">🧿</span>
            <span title="Art">🎨</span>
        </div>
    </div>

    <script>
        const fullText = [
            "正在加载 [张欢喜] 的灵魂碎片...",
            "重构：现实渲染管线 [100%]",
            "挂载：多巴胺分泌驱动 [Ready]",
            "编译：非线性情感逻辑 [Done]",
            "校准：灵性共鸣参数 [OK]",
            "---",
            "凌晨三点，笔记本又烫手了。",
            "第3927行代码，逻辑完美运行。",
            "可是... 指尖感受不到任何温度。",
            "---",
            "于是我开始在现实中寻找 [BUG]。",
            "直到我拾起一些[小物件]。",
            "当我握住它们时，",
            "听到某种 [心跳的频率]",
            "---",
            "[弥小乐杂货铺]，便诞生于此。",
            "我执意地认为，",
            "那些是内心关于[爱之感受]的溢出。",
            "既然是[溢出]，那就应该随它，",
            "继续自然的 [流淌]",
            "---",
            "既然是[流淌]，",
            "那无论是馈赠、交换、交易还是收藏。",
            "都不影响它，",
            "源于[心爱之物]的[本来面貌]。",
            "---",
            "Press Start To Pray."
        ];
 
        const terminalScreen = document.getElementById('terminal-screen');
        const mainCursor = document.getElementById('main-cursor');
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*';
        
        // 独立的解码动画类，针对单个DOM元素
        class TextScramble {
            constructor(el) {
                this.el = el;
                this.queue = [];
                this.frame = 0;
                this.frameRequest = null;
                this.resolve = null;
            }

            setText(newText) {
                const length = newText.length;
                const promise = new Promise((resolve) => this.resolve = resolve);
                
                this.queue = [];
                for (let i = 0; i < length; i++) {
                    const to = newText[i];
                    const start = Math.floor(Math.random() * 20); // 随机开始乱码
                    const end = start + Math.floor(Math.random() * 20); // 随机结束乱码
                    this.queue.push({ from: '', to, start, end, char: '' });
                }

                cancelAnimationFrame(this.frameRequest);
                this.frame = 0;
                this.update();
                return promise;
            }

            update() {
                let output = '';
                let complete = 0;
                
                for (let i = 0, n = this.queue.length; i < n; i++) {
                    let { to, start, end, char } = this.queue[i];
                    
                    if (this.frame >= end) {
                        complete++;
                        output += to;
                    } else if (this.frame >= start) {
                        if (!char || Math.random() < 0.28) {
                            char = this.randomChar();
                            this.queue[i].char = char;
                        }
                        // 乱码颜色
                        output += `<span style="color:var(--matrix-green); opacity:0.8">${char}</span>`;
                    } else {
                        output += ''; // 还没开始的位置为空
                    }
                }

                this.el.innerHTML = output;
                
                // 确保打字时始终自动滚动到底部
                terminalScreen.scrollTop = terminalScreen.scrollHeight;

                if (complete === this.queue.length) {
                    this.resolve();
                } else {
                    this.frameRequest = requestAnimationFrame(this.update.bind(this));
                    this.frame++;
                }
            }

            randomChar() {
                return chars[Math.floor(Math.random() * chars.length)];
            }
        }

        // 主流程控制器
        async function processLines() {
            for (let i = 0; i < fullText.length; i++) {
                const lineContent = fullText[i];
                
                // 1. 创建新行容器
                const newLine = document.createElement('div');
                
                // 2. 判断是否是分割线
                if (lineContent === "---") {
                    newLine.className = "divider-line";
                    newLine.innerHTML = "--------------------";
                    // 将新行插入到光标之前
                    terminalScreen.insertBefore(newLine, mainCursor);
                    terminalScreen.scrollTop = terminalScreen.scrollHeight;
                    // 分割线不需要解码动画，直接停顿一下
                    await new Promise(r => setTimeout(r, 400));
                    continue; 
                }

                // 3. 普通文本行
                newLine.className = "log-line";
                terminalScreen.insertBefore(newLine, mainCursor);
                
                // 4. 对该行应用乱码动画
                const scrambler = new TextScramble(newLine);
                await scrambler.setText(lineContent);
                
                // 5. 行间停顿
                await new Promise(r => setTimeout(r, 500));
            }
        }

        // 桌面端视差效果
        const card = document.getElementById('card');
        document.addEventListener('mousemove', (e) => {
            if(window.innerWidth > 768) {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            }
        });

        // 启动
        setTimeout(processLines, 1000);

    </script>
</body>
</html>
